services:
  backend:
    build: ./backend
    environment:
      - APP_ENV=production
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:9091}
      - DATABASE_URL=sqlite:////data/linkkeep.db
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    volumes:
      - ./data:/data
    restart: unless-stopped
    networks:
      - linkkeep-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "9091:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - linkkeep-net

networks:
  linkkeep-net:
    driver: bridge

services:
  backend:
    build: ./backend
    environment:
      - APP_ENV=production
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:9091}
      - DATABASE_URL=sqlite:////data/linkkeep.db
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-true}
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-true}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_AUTH_PER_MINUTE=${RATE_LIMIT_AUTH_PER_MINUTE:-120}
      - RATE_LIMIT_METADATA_PER_MINUTE=${RATE_LIMIT_METADATA_PER_MINUTE:-120}
      - RATE_LIMIT_HEAVY_PER_5_MINUTES=${RATE_LIMIT_HEAVY_PER_5_MINUTES:-30}
      - ADMIN_USERNAMES=${ADMIN_USERNAMES:-}
      - JOB_WORKER_ENABLED=${JOB_WORKER_ENABLED:-true}
      - JOB_WORKER_INTERVAL_SECONDS=${JOB_WORKER_INTERVAL_SECONDS:-10}
      - BACKUP_SNAPSHOTS_ENABLED=${BACKUP_SNAPSHOTS_ENABLED:-true}
      - BACKUP_SNAPSHOT_INTERVAL_HOURS=${BACKUP_SNAPSHOT_INTERVAL_HOURS:-24}
      - BACKUP_SNAPSHOT_RETENTION=${BACKUP_SNAPSHOT_RETENTION:-10}
    volumes:
      - ./data:/data
    restart: unless-stopped
    networks:
      - linkkeep-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "9091:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - linkkeep-net

networks:
  linkkeep-net:
    driver: bridge

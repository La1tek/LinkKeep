<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 400px; margin: 20px; font-family: -apple-system, system-ui, sans-serif; background: #18181b; color: #f4f4f5; }
    h2 { font-size: 16px; margin: 0 0 16px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 11px; color: #71717a; margin-bottom: 4px; text-transform: uppercase; }
    .field input { width: 100%; padding: 8px; border: 1px solid #3f3f46; border-radius: 8px; background: #09090b; color: #f4f4f5; font-size: 13px; box-sizing: border-box; }
    .btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; }
    .btn-danger { background: #dc2626; color: #fff; }
  </style>
</head>
<body>
  <h2>LinkKeep Settings</h2>
  <p style="font-size: 12px; color: #71717a; margin-bottom: 16px;">Logged in as <span id="user"></span></p>
  <button id="logout" class="btn btn-danger">Logout</button>
  <script>
    chrome.storage.local.get(['lk_user'], (data) => {
      document.getElementById('user').textContent = data.lk_user || 'unknown'
    })
    document.getElementById('logout').addEventListener('click', () => {
      chrome.storage.local.clear(() => {
        window.close()
      })
    })
  </script>
</body>
</html>

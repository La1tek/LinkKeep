<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">LinkAtlas icon</title>
  <desc id="desc">A dark rounded-square icon with a glowing constellation map and bookmark route.</desc>
  <defs>
    <linearGradient id="bg" x1="82" y1="58" x2="430" y2="468" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111a35"/>
      <stop offset="0.42" stop-color="#080d1d"/>
      <stop offset="1" stop-color="#030611"/>
    </linearGradient>
    <radialGradient id="aurora" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(164 332) rotate(-35) scale(258 178)">
      <stop offset="0" stop-color="#24d4ff" stop-opacity="0.38"/>
      <stop offset="0.48" stop-color="#7c5cff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(248 248) scale(236)">
      <stop offset="0" stop-color="#7c8cff" stop-opacity="0.26"/>
      <stop offset="0.55" stop-color="#7c8cff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#7c8cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="border" x1="99" y1="71" x2="417" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b8d8ff" stop-opacity="0.84"/>
      <stop offset="0.48" stop-color="#6d7cff" stop-opacity="0.44"/>
      <stop offset="1" stop-color="#8a5cff" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="route" x1="136" y1="374" x2="392" y2="114" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#29d7ff"/>
      <stop offset="0.42" stop-color="#8f76ff"/>
      <stop offset="1" stop-color="#f4f7ff"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeBloom" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.45 0 0 0 0 0.56 0 0 0 0 1 0 0 0 0.85 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="30" y="30" width="452" height="452" rx="112" fill="url(#bg)"/>
  <rect x="30" y="30" width="452" height="452" rx="112" fill="url(#aurora)"/>
  <rect x="30" y="30" width="452" height="452" rx="112" fill="url(#nodeGlow)"/>
  <rect x="34" y="34" width="444" height="444" rx="108" fill="none" stroke="url(#border)" stroke-width="3"/>
  <rect x="44" y="44" width="424" height="424" rx="98" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>


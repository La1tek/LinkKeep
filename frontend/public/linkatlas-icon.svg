  <path d="M204 218 254 236 297 205" fill="none" stroke="#0b1024" stroke-opacity="0.76" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M142 352 181 387 245 318 319 259 297 205 342 165 389 108" fill="none" stroke="url(#route)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>
  <path d="M204 218 254 236 297 205" fill="none" stroke="url(#route)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>

  <g filter="url(#nodeBloom)">

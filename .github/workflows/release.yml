name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build release assets
        run: bash scripts/build-release.sh

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name
        run: echo "IMAGE_REPOSITORY=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ env.IMAGE_REPOSITORY }}-backend:${{ github.ref_name }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_REPOSITORY }}-frontend:${{ github.ref_name }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release-*/LinkKeep-extension-*.zip
            dist/release-*/docker-compose.yml
            dist/release-*/.env.example
            dist/release-*/VERSION

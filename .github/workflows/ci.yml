name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run backend tests
        working-directory: backend
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run frontend e2e
        working-directory: frontend
        run: npm run test:e2e

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check extension JavaScript
        run: |
          node --check extension/background.js
          node --check extension/popup.js
          node --check extension/sidepanel.js
          node --check extension/options.js
      - name: Package extension
        run: bash scripts/package-extension.sh
      - name: Validate extension archive
        run: unzip -t frontend/public/LinkKeep-extension.zip

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose files
        run: |
          JWT_SECRET=test-secret docker compose config >/dev/null
          docker compose -f docker-compose.dev.yml config >/dev/null
